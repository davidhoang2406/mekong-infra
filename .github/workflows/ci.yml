name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint Python scripts
        run: |
          pip install ruff
          ruff check db/

      - name: Validate Docker Compose config
        run: docker compose config --quiet
