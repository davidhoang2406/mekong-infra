<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in · Mekong</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: { sans: ['"Inter"','system-ui','sans-serif'], mono: ['"JetBrains Mono"','ui-monospace','monospace'] },
    colors: { bg:'#ffffff','bg-muted':'#f5f5f5', fg:'#1e1e1e','fg-muted':'#737373', border:'#e5e5e5', up:'#16a34a', down:'#dc2626' },
  }}};
</script>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="min-h-screen bg-bg-muted grid place-items-center px-4">

<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <a href="index.html" class="inline-block text-[28px] font-bold tracking-tight">Mekong</a>
    <p class="text-[13px] text-fg-muted mt-1">Vietnam market data &middot; real-time + historical</p>
  </div>

  <div class="bg-bg border border-border rounded-xl p-8 card">
    <h1 class="text-[20px] font-semibold tracking-tight">Sign in to your account</h1>
    <p class="text-[13px] text-fg-muted mt-1">Enter your credentials below</p>

    <form class="mt-6 space-y-4">
      <label class="block">
        <span class="block text-[12px] font-medium mb-1.5">Email</span>
        <input type="email" placeholder="you@example.com" autocomplete="email" class="w-full h-11 px-3 rounded-md border border-border text-[14px] bg-bg outline-none focus:border-fg focus:ring-1 focus:ring-fg" />
      </label>

      <label class="block">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-[12px] font-medium">Password</span>
          <a href="#" class="text-[12px] text-fg-muted hover:text-fg">Forgot?</a>
        </div>
        <div class="relative">
          <input type="password" placeholder="••••••••••" autocomplete="current-password" class="w-full h-11 px-3 pr-10 rounded-md border border-border text-[14px] bg-bg outline-none focus:border-fg focus:ring-1 focus:ring-fg" />
          <button type="button" class="absolute right-2 top-1/2 -translate-y-1/2 h-7 w-7 grid place-items-center text-fg-muted hover:text-fg" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </label>

      <label class="flex items-center gap-2 text-[12px] text-fg-muted">
        <input type="checkbox" class="h-4 w-4 rounded border-border text-fg focus:ring-fg" />
        Keep me signed in on this device
      </label>

      <button type="submit" class="w-full h-11 rounded-md bg-fg text-bg text-[14px] font-semibold hover:opacity-90 transition-opacity">
        Sign in
      </button>
    </form>

    <div class="my-6 flex items-center gap-3 text-[11px] text-fg-muted uppercase tracking-wider">
      <span class="flex-1 h-px bg-border"></span>or<span class="flex-1 h-px bg-border"></span>
    </div>

    <div class="space-y-2">
      <button class="w-full h-11 rounded-md border border-border text-[14px] hover:bg-bg-muted flex items-center justify-center gap-2">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1H12v3.2h5.35c-.27 1.4-1.65 4.1-5.35 4.1-3.22 0-5.85-2.66-5.85-5.95s2.63-5.95 5.85-5.95c1.83 0 3.06.78 3.76 1.45l2.55-2.45C16.95 4.05 14.7 3 12 3 6.93 3 3 6.93 3 12s3.93 9 9 9c5.2 0 8.65-3.66 8.65-8.8 0-.6-.07-1.05-.15-1.5z"/></svg>
        Continue with Google
      </button>
      <button class="w-full h-11 rounded-md border border-border text-[14px] hover:bg-bg-muted flex items-center justify-center gap-2">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 0 0-3.79 23.4c.6.1.82-.26.82-.58v-2.1c-3.34.72-4.04-1.6-4.04-1.6-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.21.09 1.85 1.24 1.85 1.24 1.07 1.83 2.81 1.3 3.5.99.1-.78.42-1.3.76-1.6-2.67-.31-5.47-1.34-5.47-5.95 0-1.32.47-2.4 1.24-3.24-.12-.31-.54-1.55.12-3.22 0 0 1-.32 3.3 1.23a11.4 11.4 0 0 1 6 0c2.3-1.55 3.3-1.23 3.3-1.23.66 1.67.24 2.91.12 3.22.77.84 1.24 1.92 1.24 3.24 0 4.62-2.81 5.63-5.49 5.93.43.37.81 1.1.81 2.22v3.29c0 .32.21.69.83.58A12 12 0 0 0 12 .3"/></svg>
        Continue with GitHub
      </button>
    </div>
  </div>

  <p class="text-center text-[13px] text-fg-muted mt-6">
    Don't have an account?
    <a href="register.html" class="text-fg font-medium hover:underline">Create one →</a>
  </p>
</div>

</body>
</html>
