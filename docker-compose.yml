# Mekong platform — full local stack
#
# Assumed directory layout (sibling repos cloned next to mekong-infra):
#   Mekong/
#     mekong-infra/        ← this file lives here
#     mekong-notebooks/    ← MEKONG_NOTEBOOKS_DIR (default: ../mekong-notebooks)
#
# mekong-jobs is baked into the Flink and Spark images at build time.
# For local dev with hot reload, docker-compose.override.yml re-mounts it.
#
# Override in .env if your repos are elsewhere:
#   MEKONG_NOTEBOOKS_DIR=/absolute/path/to/mekong-notebooks
#   MEKONG_JOBS_DIR=/absolute/path/to/mekong-jobs   ← used by override only

services:
  # WARNING: single-broker, replication-factor 1 — dev only, no fault tolerance
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.0
    container_name: schema-registry
    restart: unless-stopped
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:v1.5.0
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  # WARNING: single-node, no erasure coding — dev only, no replication
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  flink-jobmanager:
    build:
      context: .
      dockerfile: docker/flink.Dockerfile
    container_name: flink-jobmanager
    restart: unless-stopped
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        execution.checkpointing.interval: 60000
        state.checkpoints.dir: s3a://market-data/flink-checkpoints/
        fs.s3a.endpoint: http://minio:9000
        fs.s3a.path.style.access: true
        fs.s3a.access.key: ${MINIO_ACCESS_KEY:-minioadmin}
        fs.s3a.secret.key: ${MINIO_SECRET_KEY:-minioadmin}
      ENABLE_BUILT_IN_PLUGINS: flink-s3-fs-hadoop-2.0.jar
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PYTHONPATH: /opt/project
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_ANALYSIS_BUCKET: ${MINIO_ANALYSIS_BUCKET:-market-analysis}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  flink-taskmanager:
    build:
      context: .
      dockerfile: docker/flink.Dockerfile
    container_name: flink-taskmanager
    restart: unless-stopped
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 8
        execution.checkpointing.interval: 60000
        state.checkpoints.dir: s3a://market-data/flink-checkpoints/
        fs.s3a.endpoint: http://minio:9000
        fs.s3a.path.style.access: true
        fs.s3a.access.key: ${MINIO_ACCESS_KEY:-minioadmin}
        fs.s3a.secret.key: ${MINIO_SECRET_KEY:-minioadmin}
      ENABLE_BUILT_IN_PLUGINS: flink-s3-fs-hadoop-2.0.jar
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PYTHONPATH: /opt/project
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_ANALYSIS_BUCKET: ${MINIO_ANALYSIS_BUCKET:-market-analysis}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f TaskManagerRunner > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 512m

  spark-master:
    build:
      context: .
      dockerfile: docker/spark.Dockerfile
    container_name: spark-master
    restart: unless-stopped
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MASTER_HOST: spark-master
      PYTHONPATH: /opt/project
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-market-data}
      MINIO_ANALYSIS_BUCKET: ${MINIO_ANALYSIS_BUCKET:-market-analysis}
      SPARK_MASTER_URL: spark://spark-master:7077
    ports:
      - "7077:7077"
      - "8082:8080"
    volumes:
      - spark_logs:/tmp/spark-events
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark.Dockerfile
    container_name: spark-worker
    restart: unless-stopped
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
      PYTHONPATH: /opt/project
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-market-data}
      MINIO_ANALYSIS_BUCKET: ${MINIO_ANALYSIS_BUCKET:-market-analysis}
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 512m

  spark-history-server:
    build:
      context: .
      dockerfile: docker/spark.Dockerfile
    container_name: spark-history-server
    restart: unless-stopped
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.history.HistoryServer"]
    environment:
      SPARK_HISTORY_OPTS: >-
        -Dspark.history.fs.logDirectory=/tmp/spark-events
        -Dspark.history.ui.port=18080
    ports:
      - "18080:18080"
    volumes:
      - spark_logs:/tmp/spark-events
    depends_on:
      spark-master:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  jupyter:
    build:
      context: .
      dockerfile: docker/jupyter.Dockerfile
    container_name: jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      PYTHONPATH: /opt/project
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-market-data}
      MINIO_ANALYSIS_BUCKET: ${MINIO_ANALYSIS_BUCKET:-market-analysis}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-}
    volumes:
      - ${MEKONG_NOTEBOOKS_DIR:-../mekong-notebooks}/notebooks:/opt/project/notebooks
      - ${MEKONG_NOTEBOOKS_DIR:-../mekong-notebooks}/model:/opt/project/model
    depends_on:
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

  # ── Kafka pipeline daemons ────────────────────────────────────────────────────
  # stock-price-producer owns the image build; crypto-price-producer and
  # storage-consumer reuse the same mekong-kafka:local image.
  # All three are long-running daemons — Docker Compose restart policy handles
  # crash recovery; the kafka_pipeline_health_sensor in Dagster monitors lag.
  stock-price-producer:
    build:
      context: .
      dockerfile: docker/kafka.Dockerfile
    image: mekong-kafka:local
    container_name: stock-price-producer
    restart: unless-stopped
    command: python main.py stock-price-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      PYTHONPATH: /opt/project
    volumes:
      - ${MEKONG_KAFKA_DIR:-../mekong-kafka}:/opt/project:ro
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  crypto-price-producer:
    image: mekong-kafka:local
    container_name: crypto-price-producer
    restart: unless-stopped
    command: python main.py crypto-price-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      PYTHONPATH: /opt/project
    volumes:
      - ${MEKONG_KAFKA_DIR:-../mekong-kafka}:/opt/project:ro
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  storage-consumer:
    image: mekong-kafka:local
    container_name: storage-consumer
    restart: unless-stopped
    command: python main.py storage-consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      PYTHONPATH: /opt/project
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-market-data}
    volumes:
      - ${MEKONG_KAFKA_DIR:-../mekong-kafka}:/opt/project:ro
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  # Exposes only /containers and /exec Docker API endpoints to Dagster.
  # Dagster submits Spark jobs via `docker exec spark-master spark-submit ...`.
  # Replacing the raw socket mount prevents container escape / host root access.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: docker-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      EXEC: 1
      POST: 1   # required for container start/stop via Docker SDK
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m

  dagster-webserver:
    build:
      context: .
      dockerfile: docker/dagster.Dockerfile
    container_name: dagster-webserver
    restart: unless-stopped
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w /opt/dagster/app/workspace.yaml
    ports:
      - "3000:3000"
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-market-data}
      MINIO_ANALYSIS_BUCKET: ${MINIO_ANALYSIS_BUCKET:-market-analysis}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DAGSTER_WEBSERVER_URL: ${DAGSTER_WEBSERVER_URL:-http://localhost:3000}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ${MEKONG_DAGSTER_DIR:-../mekong-dagster}:/opt/dagster/app
      - dagster_storage:/opt/dagster/dagster_home/storage
      - ./dagster/dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
    depends_on:
      minio:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/server_info')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  dagster-daemon:
    build:
      context: .
      dockerfile: docker/dagster.Dockerfile
    container_name: dagster-daemon
    restart: unless-stopped
    command: dagster-daemon run -w /opt/dagster/app/workspace.yaml
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-market-data}
      MINIO_ANALYSIS_BUCKET: ${MINIO_ANALYSIS_BUCKET:-market-analysis}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DAGSTER_WEBSERVER_URL: ${DAGSTER_WEBSERVER_URL:-http://localhost:3000}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ${MEKONG_DAGSTER_DIR:-../mekong-dagster}:/opt/dagster/app
      - dagster_storage:/opt/dagster/dagster_home/storage
      - ./dagster/dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
    depends_on:
      dagster-webserver:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./logging/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  promtail:
    image: grafana/promtail:3.4.2
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./logging/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  grafana:
    image: grafana/grafana:11.6.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./logging/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

volumes:
  kafka_data:
  minio_data:
  spark_logs:
  dagster_storage:
  loki_data:
  grafana_data:
