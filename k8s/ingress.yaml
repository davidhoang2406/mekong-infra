# All ingresses route through Kong Ingress Controller.
# Install Kong before applying:
#   helm repo add kong https://charts.konghq.com
#   helm install kong kong/ingress -n kong --create-namespace
#
# Add to /etc/hosts (127.0.0.1 — access via kubectl port-forward):
#   127.0.0.1 dagster.mekong.local grafana.mekong.local kafka-ui.mekong.local minio.mekong.local jupyter.mekong.local spark-history.mekong.local flink.mekong.local api.mekong.local app.mekong.local
#
# Port-forward Kong proxy:
#   kubectl port-forward -n kong svc/kong-gateway-proxy 8080:80
#
# Platform ingress (app.mekong.local, api.mekong.local) with CORS plugin:
#   see k8s/kong/ingress-platform.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mekong-ingress-data
  namespace: mekong-data
  labels:
    app.kubernetes.io/part-of: mekong
spec:
  ingressClassName: kong
  rules:
    - host: kafka-ui.mekong.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-ui
                port:
                  number: 8080
    - host: minio.mekong.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001
---
