# Requires nginx ingress controller:
#   minikube addons enable ingress
#
# Add to /etc/hosts (get minikube IP via `minikube ip`):
#   <minikube-ip> dagster.mekong.local grafana.mekong.local kafka-ui.mekong.local minio.mekong.local jupyter.mekong.local spark-history.mekong.local flink.mekong.local api.mekong.local
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mekong-ingress-data
  namespace: mekong-data
  labels:
    app.kubernetes.io/part-of: mekong
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: kafka-ui.mekong.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-ui
                port:
                  number: 8080
    - host: minio.mekong.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001
---
