apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mekong-ingress-platform
  namespace: mekong-platform
  labels:
    app.kubernetes.io/part-of: mekong
  annotations:
    konghq.com/plugins: cors,rate-limit
    # Kong passes WebSocket upgrades automatically for http/https routes
spec:
  ingressClassName: kong
  rules:
    - host: app.mekong.local
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: mekong-ws
                port:
                  number: 8091
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mekong-api
                port:
                  number: 8090
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mekong-web
                port:
                  number: 80
    - host: api.mekong.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mekong-api
                port:
                  number: 8090
    # OAuth callbacks arrive at localhost:8080 (OAUTH_REDIRECT_BASE)
    # Also serves the full app so post-OAuth redirects to / work
    - host: localhost
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: mekong-ws
                port:
                  number: 8091
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mekong-api
                port:
                  number: 8090
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mekong-web
                port:
                  number: 80
