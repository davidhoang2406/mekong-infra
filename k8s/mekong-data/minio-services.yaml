apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: mekong-data
  labels:
    app: minio
    app.kubernetes.io/part-of: mekong
spec:
  clusterIP: None
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# ClusterIP — stable endpoint for S3A (Flink/Spark/Dagster/Jupyter).
# All internal services reference: http://minio.mekong-data.svc.cluster.local:9000
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: mekong-data
  labels:
    app: minio
    app.kubernetes.io/part-of: mekong
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
