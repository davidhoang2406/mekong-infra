apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jupyter-notebooks
  namespace: mekong-dev
  labels:
    app.kubernetes.io/part-of: mekong
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter
  namespace: mekong-dev
  labels:
    app: jupyter
    app.kubernetes.io/part-of: mekong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jupyter
  template:
    metadata:
      labels:
        app: jupyter
        app.kubernetes.io/part-of: mekong
    spec:
      containers:
        - name: jupyter
          image: ghcr.io/davidhoang2406/mekong-jupyter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          env:
            - name: PYTHONPATH
              value: /opt/project
            - name: MINIO_ENDPOINT
              value: http://minio.mekong-data.svc.cluster.local:9000
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret-key
            - name: MINIO_BUCKET
              value: market-data
            - name: MINIO_ANALYSIS_BUCKET
              value: market-analysis
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka-headless.mekong-data.svc.cluster.local:29092
            - name: JUPYTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jupyter-credentials
                  key: token
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: notebooks
              mountPath: /opt/project/notebooks
      volumes:
        - name: notebooks
          persistentVolumeClaim:
            claimName: jupyter-notebooks
---
apiVersion: v1
kind: Service
metadata:
  name: jupyter
  namespace: mekong-dev
  labels:
    app: jupyter
    app.kubernetes.io/part-of: mekong
spec:
  selector:
    app: jupyter
  ports:
    - port: 8888
      targetPort: 8888
