# Cross-namespace secret mirrors for mekong-orchestration.
# Apply AFTER mekong-data/secrets are created.
#
# To mirror minio-credentials from mekong-data:
#   kubectl get secret minio-credentials -n mekong-data -o yaml \
#     | sed 's/namespace: mekong-data/namespace: mekong-orchestration/' \
#     | kubectl apply -f -
#
# To mirror telegram-credentials:
#   kubectl get secret telegram-credentials -n mekong-data -o yaml \
#     | sed 's/namespace: mekong-data/namespace: mekong-orchestration/' \
#     | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: mekong-orchestration
type: Opaque
data:
  access-key: <base64-encoded-access-key>
  secret-key: <base64-encoded-secret-key>
---
apiVersion: v1
kind: Secret
metadata:
  name: telegram-credentials
  namespace: mekong-orchestration
type: Opaque
data:
  bot-token: <base64-encoded-bot-token>
  chat-id: <base64-encoded-chat-id>
