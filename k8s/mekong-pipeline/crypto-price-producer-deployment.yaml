apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-price-producer
  namespace: mekong-pipeline
  labels:
    app: crypto-price-producer
    app.kubernetes.io/part-of: mekong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto-price-producer
  template:
    metadata:
      labels:
        app: crypto-price-producer
        app.kubernetes.io/part-of: mekong
    spec:
      containers:
        - name: producer
          image: ghcr.io/davidhoang2406/mekong-kafka:latest
          imagePullPolicy: Always
          command: ["python", "main.py", "crypto-price-producer"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka-headless.mekong-data.svc.cluster.local:29092
            - name: SCHEMA_REGISTRY_URL
              value: http://schema-registry.mekong-data.svc.cluster.local:8081
            - name: PYTHONPATH
              value: /opt/project
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 30
