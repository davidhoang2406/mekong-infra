# Cross-namespace secret mirror for minio-credentials.
# Apply AFTER mekong-data/secrets are created.
# Replace <base64-values> with: echo -n 'value' | base64
#
# To generate from the mekong-data secret:
#   kubectl get secret minio-credentials -n mekong-data -o yaml \
#     | sed 's/namespace: mekong-data/namespace: mekong-pipeline/' \
#     | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: mekong-pipeline
type: Opaque
data:
  access-key: <base64-encoded-access-key>
  secret-key: <base64-encoded-secret-key>
