apiVersion: batch/v1
kind: CronJob
metadata:
  name: stock-price-producer
  namespace: mekong-pipeline
  labels:
    app: stock-price-producer
    app.kubernetes.io/part-of: mekong
spec:
  # 09:00 ICT (UTC+7) = 02:00 UTC, Monday–Friday
  schedule: "0 2 * * 1-5"
  timeZone: "Asia/Ho_Chi_Minh"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      # Kill the job at 15:00 ICT (6 hours after 09:00 open)
      activeDeadlineSeconds: 21600
      template:
        metadata:
          labels:
            app: stock-price-producer
            app.kubernetes.io/part-of: mekong
        spec:
          restartPolicy: OnFailure
          containers:
            - name: producer
              image: ghcr.io/davidhoang2406/mekong-kafka:latest
              imagePullPolicy: Always
              command: ["python", "main.py", "stock-price-producer"]
              env:
                - name: KAFKA_BOOTSTRAP_SERVERS
                  value: kafka-headless.mekong-data.svc.cluster.local:29092
                - name: SCHEMA_REGISTRY_URL
                  value: http://schema-registry.mekong-data.svc.cluster.local:8081
                - name: PYTHONPATH
                  value: /opt/project
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
