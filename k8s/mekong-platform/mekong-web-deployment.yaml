apiVersion: apps/v1
kind: Deployment
metadata:
  name: mekong-web
  namespace: mekong-platform
  labels:
    app: mekong-web
    app.kubernetes.io/part-of: mekong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mekong-web
  template:
    metadata:
      labels:
        app: mekong-web
        app.kubernetes.io/part-of: mekong
    spec:
      containers:
        - name: mekong-web
          image: ghcr.io/davidhoang2406/mekong-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mekong-web
  namespace: mekong-platform
  labels:
    app: mekong-web
    app.kubernetes.io/part-of: mekong
spec:
  selector:
    app: mekong-web
  ports:
    - port: 80
      targetPort: 80
