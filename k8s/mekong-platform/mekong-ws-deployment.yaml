apiVersion: apps/v1
kind: Deployment
metadata:
  name: mekong-ws
  namespace: mekong-platform
  labels:
    app: mekong-ws
    app.kubernetes.io/part-of: mekong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mekong-ws
  template:
    metadata:
      labels:
        app: mekong-ws
        app.kubernetes.io/part-of: mekong
    spec:
      containers:
        - name: mekong-ws
          image: ghcr.io/davidhoang2406/mekong-ws:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
          env:
            - name: PORT
              value: "8091"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka-headless.mekong-data.svc.cluster.local:29092
            - name: KAFKA_CONSUMER_GROUP
              value: ws-fanout
            - name: MAX_CLIENTS
              value: "1000"
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mekong-ws
  namespace: mekong-platform
  labels:
    app: mekong-ws
    app.kubernetes.io/part-of: mekong
spec:
  selector:
    app: mekong-ws
  ports:
    - name: ws
      port: 8091
      targetPort: 8091
