# Cross-namespace secret mirrors for mekong-processing.
# Flink pods reference minio-credentials and telegram-credentials in this namespace.
# Apply AFTER mekong-data secrets are created.
#
# To mirror from mekong-data:
#   kubectl get secret minio-credentials -n mekong-data -o yaml \
#     | sed 's/namespace: mekong-data/namespace: mekong-processing/' \
#     | kubectl apply -f -
#   kubectl get secret telegram-credentials -n mekong-data -o yaml \
#     | sed 's/namespace: mekong-data/namespace: mekong-processing/' \
#     | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: mekong-processing
type: Opaque
data:
  access-key: <base64-encoded-access-key>
  secret-key: <base64-encoded-secret-key>
---
apiVersion: v1
kind: Secret
metadata:
  name: telegram-credentials
  namespace: mekong-processing
type: Opaque
data:
  bot-token: <base64-encoded-bot-token>
  chat-id: <base64-encoded-chat-id>
