apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history
  namespace: mekong-processing
  labels:
    app: spark-history
    app.kubernetes.io/part-of: mekong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-history
  template:
    metadata:
      labels:
        app: spark-history
        app.kubernetes.io/part-of: mekong
    spec:
      containers:
        - name: spark-history
          image: ghcr.io/davidhoang2406/mekong-spark:latest
          imagePullPolicy: IfNotPresent
          command:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.history.HistoryServer
          ports:
            - containerPort: 18080
          env:
            # K8s substitutes $(VAR) references from earlier env entries in the same list.
            # MINIO_ACCESS_KEY and MINIO_SECRET_KEY must be declared BEFORE SPARK_HISTORY_OPTS.
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: secret-key
            - name: SPARK_HISTORY_OPTS
              value: >-
                -Dspark.history.fs.logDirectory=s3a://market-data/spark-events
                -Dspark.history.ui.port=18080
                -Dspark.hadoop.fs.s3a.endpoint=http://minio.mekong-data.svc.cluster.local:9000
                -Dspark.hadoop.fs.s3a.path.style.access=true
                -Dspark.hadoop.fs.s3a.access.key=$(MINIO_ACCESS_KEY)
                -Dspark.hadoop.fs.s3a.secret.key=$(MINIO_SECRET_KEY)
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: spark-history
  namespace: mekong-processing
  labels:
    app: spark-history
    app.kubernetes.io/part-of: mekong
spec:
  selector:
    app: spark-history
  ports:
    - port: 18080
      targetPort: 18080
