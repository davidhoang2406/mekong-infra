apiVersion: v1
kind: ServiceAccount
metadata:
  name: dagster
  namespace: mekong-orchestration
  labels:
    app.kubernetes.io/part-of: mekong
---
# Dagster needs to create/delete K8s Jobs and SparkApplications in mekong-processing.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dagster-job-runner
  namespace: mekong-processing
  labels:
    app.kubernetes.io/part-of: mekong
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dagster-job-runner
  namespace: mekong-processing
  labels:
    app.kubernetes.io/part-of: mekong
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dagster-job-runner
subjects:
  - kind: ServiceAccount
    name: dagster
    namespace: mekong-orchestration
---
# Dagster daemon creates K8s Jobs (run pods) in mekong-orchestration (job_namespace).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dagster-run-launcher
  namespace: mekong-orchestration
  labels:
    app.kubernetes.io/part-of: mekong
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dagster-run-launcher
  namespace: mekong-orchestration
  labels:
    app.kubernetes.io/part-of: mekong
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dagster-run-launcher
subjects:
  - kind: ServiceAccount
    name: dagster
    namespace: mekong-orchestration
---
# Dagster needs pod read + deployment scale access in mekong-pipeline
# for the health sensor (container_running) and start/stop jobs.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dagster-pipeline-manager
  namespace: mekong-pipeline
  labels:
    app.kubernetes.io/part-of: mekong
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dagster-pipeline-manager
  namespace: mekong-pipeline
  labels:
    app.kubernetes.io/part-of: mekong
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dagster-pipeline-manager
subjects:
  - kind: ServiceAccount
    name: dagster
    namespace: mekong-orchestration
