# Template — replace placeholders with real base64 values locally; do not commit real secrets.
#   username/password:  echo -n '<value>' | base64
#   url:                echo -n 'postgres://<user>:<pass>@platform-postgres.mekong-platform.svc.cluster.local:5432/mekong_api?sslmode=disable' | base64
apiVersion: v1
kind: Secret
metadata:
  name: platform-postgres
  namespace: mekong-platform
type: Opaque
data:
  username: <base64-encoded-username>
  password: <base64-encoded-password>
  url: <base64-encoded-postgres-url>
