_format_version: "3.0"

services:
  # REST API
  - name: api
    url: http://mekong-api:8090
    routes:
      - name: api-routes
        paths: ["/api"]
        strip_path: false
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: [GET, POST, PUT, DELETE, OPTIONS]
          headers: [Content-Type, X-API-Key, Authorization]
          max_age: 3600
      # Phase 4: uncomment to enable auth + rate limiting
      # - name: key-auth
      #   config:
      #     key_names: [X-API-Key]
      # - name: rate-limiting
      #   config:
      #     minute: 100
      #     policy: local

  # WebSocket server (Phase 3)
  # - name: ws
  #   url: http://mekong-ws:8091
  #   routes:
  #     - name: ws-route
  #       paths: ["/ws"]
  #       strip_path: false
  #       protocols: [http, https, ws, wss]

  # Internal snapshot API — blocked to external traffic
  # - name: internal
  #   url: http://mekong-ws:8091
  #   routes:
  #     - name: internal-snapshot
  #       paths: ["/internal"]
  #       strip_path: false
  #   plugins:
  #     - name: ip-restriction
  #       config:
  #         allow: ["172.16.0.0/12"]

  # React SPA (Phase 2) — catch-all; /api (and Phase 3 /ws) match first because
  # Kong prefers the more specific path prefix.
  - name: web
    url: http://mekong-web:80
    routes:
      - name: web-root
        paths: ["/"]
        strip_path: false
